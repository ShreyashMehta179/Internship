<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Form</title>
</head>
<body>
    <form action="action.php" method="get" autocomplete="on">

        <div>
        <label for="fname">Fulll Name</label>
        <input type="text" id="fname" name="Fullname" required placeholder="Enter the Full Name"><br><br>

        <label for="Email">Email</label>
        <input type="email" id="Email" name="Email" placeholder="Enter the Email" required><br><br>
        
        <label for="date">Date of Birth</label>
        <input type="date" id="date" name="Date of Birth"><br><br>

        <label>Select the Gender</label>
        <input type="radio" id="Male" name="Gender" value="Male">
        <label for="Male">Male</label>
        <input type="radio" name="Gender" id="Female" value="Female">
        <label for="Female">Female</label><br><br>
        
        <label for="number">Phone Number</label>
        <input type="tel" id="number" name="Phone-Number"><br><br>
        
        <label for="collagename">Enter the Collage Name</label>
        <input type="text" id="collagename" name="Collage-Name"><br><br>
        
        <label for="internships">Select The Internship</label> <br>
        <select id="internships" name="Internship Choice">
            <option value="Mern Stack">Full Stack Development (MERN Stack)</option>
            <option value="Pyhton">Mobile Application Development</option>
            <option value="Pyhton">Python + Django/Flask</option>
            <option value="Pyhton">Cloud (Google Cloud)</option> 
        </select><br><br>
     
        <label for="Resume-file">Upload the Resume</label>
        <input type="file" id="Resume-file" value="Resume-file"> <br><br>

        <label>Enter the Address</label><br>
        <textarea name="address" rows="5" cols="30"></textarea>
        <br>
        <input type="submit" value="submit">
        <input type="reset" value="reset">
    </div>
    </form>
</body>
</html>
