<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing Area</title>
</head>
<body>
    <canvas id="mycanvas" width="500" height="500" style="border: 2px ridge black;"></canvas>
    
     <script>
       let canvas=document.getElementById("mycanvas");
       let ctx=canvas.getContext("2d");

       let drawing=false;

       canvas.addEventListener("mousedown",function ()
       {
        drawing=true;
        ctx.beginPath();
          
        //   let rect=canvas.getBoundingClientRect();
          
        //   let x=e.clientX-rect.left;
        //   let y=e.clientY-rect.top; 
           
        //   ctx.lineWidth=3;
        //   ctx.lineCap="round";

        //   ctx.moveTo(x,y);
       });

      canvas.addEventListener("mouseup", function()
      {
         drawing=false;
      });

      canvas.addEventListener("mousemove", function(e)
      {
          if (!drawing) return;
          
          let rect=canvas.getBoundingClientRect();
          
          let x=e.clientX-rect.left;
          let y=e.clientY-rect.top; 
           
        //   ctx.lineTo(e.clientX, e.clientY); if the whole window is used the we can used this function

          ctx.lineWidth=3;
          ctx.lineCap="round";

          ctx.lineTo(x,y);
          ctx.stroke();
      });
     </script>
</body>
</html>
